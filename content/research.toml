type = "card"
title = "Research"
description = "Experimental high-energy-physics program on hyperons, baryon-sector symmetry tests, and charmed-hadron spectroscopy."

[[items]]
title = "Hyperon CP Violation and Decay Asymmetries"
subtitle = "Precision measurements with entangled hyperon-antihyperon pairs"
content = "I perform precision measurements of hyperon decay parameters and CP asymmetries, with emphasis on entangled baryon-pair production at BESIII and robust control of detector and analysis systematics."
tags = ["Hyperons", "CP Violation", "BESIII"]

[[items]]
title = "Hyperon Electric Dipole Moments"
subtitle = "Indirect EDM probes through full angular analyses"
content = "I develop and apply analysis strategies to improve sensitivity to hyperon EDM effects, using multi-dimensional angular information as precision probes of CP-violating new-physics scenarios."
tags = ["EDM", "CP Symmetry", "Precision"]

[[items]]
title = "Hyperon-Nucleon Interactions"
subtitle = "Baryon interaction studies at e+e- colliders"
content = "I study hyperon-nucleon interactions with collider-produced hyperons, including inelastic processes and method development relevant to hadronic and nuclear physics."
tags = ["Hyperon-Nucleon", "Hadron Physics", "Nuclear Implications"]

[[items]]
title = "Charm-Hadron Amplitude Analysis at LHCb"
subtitle = "Resonance studies and partial-wave analysis"
content = "At LHCb, I work on resonance studies in charmed-hadron decays using partial-wave analysis, and contribute to analysis production and MC coordination in the Charm working group."
tags = ["LHCb", "Charm Physics", "Amplitude Analysis"]
